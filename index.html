<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的文件主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #f5f7fa;
            padding: 40px 20px;
            text-align: center;
        }
        h1 {
            margin-bottom: 30px;
            color: #333;
        }
        .button {
            display: block;
            width: 300px;
            margin: 10px auto;
            padding: 14px 20px;
            background: #007bff;
            color: white;
            font-size: 16px;
            border-radius: 10px;
            text-decoration: none;
            transition: 0.2s;
        }
        .button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <h1>我的 HTML 文件</h1>
    <div id="container"></div>

    <script>
        // 自动获取当前仓库地址
        const repoUrl = window.location.origin + window.location.pathname;

        // 自动扫描当前目录所有 HTML 文件
        fetch(repoUrl)
            .then(res => res.text())
            .then(text => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');
                const container = document.getElementById('container');

                // 找出所有 .html 文件
                const links = doc.querySelectorAll('a[href$=".html"]');
                
                links.forEach(a => {
                    const filename = a.textContent.trim();
                    if (filename === 'index.html') return; // 跳过自己

                    const btn = document.createElement('a');
                    btn.className = 'button';
                    btn.href = filename;
                    btn.target = '_blank';
                    btn.textContent = filename.replace('.html', '');
                    container.appendChild(btn);
                });
            });
    </script>
</body>
</script>
</body>
</html>
